  <rect x="24" y="668" width="332" height="48" rx="24" fill="#1565c0"/>
  <text x="190" y="698" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="600" fill="#fff">Save &amp; reboot</text>
  <text x="190" y="748" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="9" fill="#94a3b8">Wireframe  see src/main.cpp kPortalPage</text>
