; Medical alert prototype — Seeed XIAO ESP32-C6 (MR60BHA2) + NeoPixel
; Official platform-espressif32 marks this board "espidf" only; Arduino on C6 needs pioarduino.
; See: https://github.com/platformio/platform-espressif32/pull/1380
[env:seeed_xiao_esp32c6]
platform = https://github.com/pioarduino/platform-espressif32.git
board = seeed_xiao_esp32c6
framework = arduino
; Insert esptool --no-progress after write-flash (Unicode bar breaks Windows cp1252 in PIO).
extra_scripts =
  pre:scripts/gen_build_version.py
  post:pio_no_progress.py
  post:scripts/patch_compile_commands.py
monitor_speed = 115200
monitor_port = COM5
; Lower if upload fails with "Write timeout" (USB hub / cable / driver).
upload_speed = 460800
upload_port = COM5
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  ; With pioarduino / Arduino-ESP32, pair CDC-on-boot with USB mode so `Serial` routes to native USB CDC (otherwise COM may open but print nothing).
  -DARDUINO_USB_MODE=1
  ; Omit next line to use optional include/credentials.h (compile-time WiFi/Twilio defaults).
  -DMEDALERT_SKIP_CREDENTIALS_H=1
; mmWave: vendored under lib/ (patched SEEED_MR60BHA2.h — invalid C++ typedef union).
lib_deps =
  adafruit/Adafruit NeoPixel@^1.12.0
; Keep the Matter spike out of the main firmware build.
build_src_filter = +<*> -<matter_spike/>

; Matter bench spike: MR60 person-present as a Matter occupancy sensor.
; See docs/ALEXA-FEATURES.md §5 and src/matter_spike/matter_spike.cpp.
; Build/flash: pio run -e matter_spike -t upload
[env:matter_spike]
platform = https://github.com/pioarduino/platform-espressif32.git
board = seeed_xiao_esp32c6
framework = arduino
extra_scripts = post:pio_no_progress.py
monitor_speed = 115200
monitor_port = COM5
upload_speed = 460800
upload_port = COM5
; Matter stack is large — no-OTA layout with a 3 MB app slot (flash-budget data point for v2).
board_build.partitions = huge_app.csv
build_src_filter = -<*> +<matter_spike/>
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
