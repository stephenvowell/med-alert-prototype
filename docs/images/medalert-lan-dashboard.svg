<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 620" width="420" height="620" role="img" aria-labelledby="t2">
  <title id="t2">MedAlert LAN dashboard  reference wireframe</title>
  <defs>
    <linearGradient id="dh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#f4f6f8"/>
    </linearGradient>
  </defs>
  <rect width="420" height="620" fill="#f4f6f8"/>
  <rect x="10" y="10" width="400" height="600" rx="14" fill="#fff" stroke="#e2e8f0"/>
  <rect x="10" y="10" width="400" height="56" rx="14" fill="url(#dh)"/>
  <line x1="10" y1="56" x2="410" y2="56" stroke="#1565c0" stroke-width="3"/>
  <text x="28" y="46" font-family="system-ui,Segoe UI,sans-serif" font-size="20" font-weight="700" fill="#0f172a">MedAlert</text>
  <!-- Card grid 2 cols -->
  <g font-family="system-ui,Segoe UI,sans-serif">
    <rect x="20" y="72" width="188" height="88" rx="12" fill="#fff" stroke="#e2e8f0"/>
    <text x="32" y="94" font-size="11" font-weight="600" fill="#475569">Heart (BPM)</text>
    <text x="32" y="128" font-size="22" font-weight="700" fill="#0f172a">72.0</text>
    <rect x="212" y="72" width="188" height="88" rx="12" fill="#fff" stroke="#e2e8f0"/>
    <text x="224" y="94" font-size="11" font-weight="600" fill="#475569">Breath (/min)</text>
    <text x="224" y="128" font-size="22" font-weight="700" fill="#0f172a">14.0</text>
    <rect x="20" y="168" width="188" height="88" rx="12" fill="#fff" stroke="#e2e8f0"/>
    <text x="32" y="190" font-size="11" font-weight="600" fill="#475569">Distance (m)</text>
    <text x="32" y="224" font-size="22" font-weight="700" fill="#0f172a">1.12</text>
    <rect x="212" y="168" width="188" height="88" rx="12" fill="#fff" stroke="#e2e8f0"/>
    <text x="224" y="190" font-size="11" font-weight="600" fill="#475569">Person (radar)</text>
    <text x="224" y="224" font-size="22" font-weight="700" fill="#0f172a">yes</text>
    <rect x="20" y="264" width="380" height="88" rx="12" fill="#fff" stroke="#e2e8f0"/>
    <text x="32" y="286" font-size="11" font-weight="600" fill="#475569">State</text>
    <text x="32" y="322" font-size="22" font-weight="700" fill="#0f172a">idle</text>
  </g>
  <text x="24" y="388" font-family="system-ui,Segoe UI,sans-serif" font-size="12" fill="#0f172a">Alarms require person detected plus low vitals (debounce).</text>
  <text x="24" y="410" font-family="system-ui,Segoe UI,sans-serif" font-size="12" fill="#0f172a">Primary SMS in 0s · Family SMS in 0s</text>
  <text x="24" y="438" font-family="system-ui,Segoe UI,sans-serif" font-size="12" fill="#0f172a">SMS consent (NVS): & · WiFi: connected</text>
  <text x="24" y="468" font-family="ui-monospace,monospace" font-size="10" fill="#64748b">v0.1.0 · git & · build &</text>
  <rect x="20" y="492" width="380" height="52" rx="12" fill="#b71c1c"/>
  <text x="210" y="526" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="600" fill="#fff">Cancel alert / clear LEDs</text>
  <text x="210" y="588" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="9" fill="#94a3b8">Wireframe  see src/main.cpp kDashPage</text>
</svg>
